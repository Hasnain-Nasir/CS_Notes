<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 320" role="img" aria-labelledby="title desc">
  <title id="title">Prototype model — throwaway cycle</title>
  <desc id="desc">Requirements, quick design, build prototype, user evaluation, refine requirements; loop until satisfied, then build final product.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="720" height="320" fill="#f8fafc"/>
  <text x="360" y="28" text-anchor="middle" font-family="system-ui,sans-serif" font-size="15" font-weight="700" fill="#0f172a">Prototype Model (throwaway cycle)</text>

  <rect x="24" y="70" width="110" height="48" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="79" y="99" text-anchor="middle" font-size="11" fill="#1e3a8a">Requirements</text>

  <path d="M134 94h36" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="170" y="70" width="110" height="48" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="225" y="99" text-anchor="middle" font-size="11" fill="#1e3a8a">Quick design</text>

  <path d="M280 94h36" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="316" y="70" width="110" height="48" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="371" y="99" text-anchor="middle" font-size="11" fill="#92400e">Build prototype</text>

  <path d="M426 94h36" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="462" y="70" width="110" height="48" rx="6" fill="#dbeafe" stroke="#2563eb" stroke-width="1.5"/>
  <text x="517" y="99" text-anchor="middle" font-size="11" fill="#1e3a8a">User evaluation</text>

  <path d="M572 94h36" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="608" y="70" width="88" height="48" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="652" y="99" text-anchor="middle" font-size="11" fill="#14532d">Refine SRS</text>

  <path d="M652 118v28h-580v28h580" fill="none" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="6 4" marker-end="url(#arrow)"/>
  <text x="360" y="168" text-anchor="middle" font-size="11" fill="#64748b">Repeat until requirements are clear</text>

  <path d="M371 118v52h-247v-24" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="248" y="200" text-anchor="middle" font-size="10" fill="#64748b">More changes needed</text>

  <rect x="200" y="220" width="320" height="52" rx="6" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="360" y="244" text-anchor="middle" font-size="12" font-weight="600" fill="#312e81">Final implementation</text>
  <text x="360" y="262" text-anchor="middle" font-size="10" fill="#4338ca">Discard prototype; build production system from refined SRS</text>

  <path d="M652 118v102h-132" fill="none" stroke="#16a34a" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="560" y="210" text-anchor="middle" font-size="10" fill="#16a34a">Customer satisfied</text>
</svg>
