  <text x="438" y="62" font-size="9" fill="#3d4a5c">CĀ</text>
  <text x="518" y="62" font-size="9" fill="#3d4a5c">Cā</text>
  <text x="596" y="62" font-size="9" fill="#3d4a5c">CÉ</text>
  <path d="M400 56 H420" stroke="#3d4a5c" stroke-width="1.2"/>
  <text x="20" y="175" font-size="9" fill="#3d4a5c" opacity="0.85">Fixed-size blocks (e.g. 128 bits)  unlike stream ciphers that XOR bit-by-bit with a keystream.</text>
  <rect x="20" y="188" width="200" height="24" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1" stroke-dasharray="3 2" opacity="0.6"/>
  <text x="30" y="204" font-size="8" fill="#3d4a5c">Stream cipher: P ē keystream í C (same length)</text>
