  <text x="312" y="68" font-size="8" fill="#3d4a5c" opacity="0.8">+ key K</text>
  <path d="M252 56 H300 M252 56 l8-6 M252 56 l8 6" stroke="#3d4a5c" stroke-width="1.2" fill="none"/>
  <text x="20" y="120" font-size="12" font-weight="600" fill="#3d4a5c">Ciphertext (blocks)</text>
