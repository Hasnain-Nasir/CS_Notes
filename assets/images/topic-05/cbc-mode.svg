<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 260" role="img" aria-label="Cipher Block Chaining mode">
  <text x="20" y="22" font-size="11" font-weight="600" fill="#3d4a5c">CBC encryption (chained blocks)</text>
  <rect x="30" y="40" width="56" height="36" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1.5"/>
  <text x="48" y="62" font-size="9" fill="#3d4a5c">Pü</text>
  <circle cx="120" cy="58" r="14" fill="none" stroke="#3d4a5c" stroke-width="1.2"/>
  <text x="114" y="62" font-size="8" fill="#3d4a5c">Ģ</text>
  <text x="96" y="48" font-size="7" fill="#3d4a5c" opacity="0.7">IV</text>
  <rect x="150" y="40" width="56" height="36" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1.5"/>
  <text x="168" y="58" font-size="8" fill="#3d4a5c">E(K)</text>
  <rect x="230" y="40" width="56" height="36" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1.5"/>
  <text x="248" y="62" font-size="9" fill="#3d4a5c">Cü</text>
  <path d="M286 58 H310 V100 H120 V100" stroke="#3d4a5c" stroke-width="1" fill="none" marker-end="url(#arr)"/>
  <rect x="30" y="100" width="56" height="36" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1.5"/>
  <text x="48" y="122" font-size="9" fill="#3d4a5c">Pé</text>
  <circle cx="120" cy="118" r="14" fill="none" stroke="#3d4a5c" stroke-width="1.2"/>
  <text x="114" y="122" font-size="8" fill="#3d4a5c">Ģ</text>
  <rect x="150" y="100" width="56" height="36" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1.5"/>
  <rect x="230" y="100" width="56" height="36" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1.5"/>
  <text x="248" y="122" font-size="9" fill="#3d4a5c">Cé</text>
  <defs><marker id="arr" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#3d4a5c"/></marker></defs>
  <text x="320" y="62" font-size="9" fill="#3d4a5c">Prior ciphertext XORed into next block  hides patterns (vs ECB).</text>
  <rect x="320" y="140" width="300" height="100" rx="6" fill="none" stroke="#3d4a5c" stroke-width="1" opacity="0.45"/>
  <text x="335" y="162" font-size="9" font-weight="600" fill="#3d4a5c">Modes (Section 5.5)</text>
  <text x="335" y="180" font-size="8" fill="#3d4a5c">ECB  independent blocks (pattern leak)</text>
  <text x="335" y="196" font-size="8" fill="#3d4a5c">CBC  chaining (shown above)</text>
  <text x="335" y="212" font-size="8" fill="#3d4a5c">GCM  encryption + integrity (AEAD)</text>
</svg>
