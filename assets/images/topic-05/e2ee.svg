<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 200" role="img" aria-label="End-to-end vs link encryption">
  <text x="20" y="20" font-size="11" font-weight="600" fill="#3d4a5c">End-to-End Encryption (E2EE)</text>
  <rect x="20" y="36" width="90" height="44" rx="5" fill="none" stroke="#3d4a5c" stroke-width="2"/>
  <text x="38" y="58" font-size="10" fill="#3d4a5c">Sender</text>
  <text x="32" y="72" font-size="8" fill="#3d4a5c" opacity="0.8">encrypts here</text>
  <rect x="140" y="44" width="360" height="28" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="155" y="62" font-size="9" fill="#3d4a5c">Encrypted payload  routers/ISPs see routing headers only</text>
  <rect x="530" y="36" width="90" height="44" rx="5" fill="none" stroke="#3d4a5c" stroke-width="2"/>
  <text x="548" y="58" font-size="10" fill="#3d4a5c">Receiver</text>
  <text x="538" y="72" font-size="8" fill="#3d4a5c" opacity="0.8">decrypts here</text>
  <path d="M110 58 H140 M500 58 H530" stroke="#3d4a5c" stroke-width="1.2"/>
  <text x="20" y="110" font-size="11" font-weight="600" fill="#3d4a5c" opacity="0.85">Link encryption (hop-by-hop)</text>
  <rect x="20" y="124" width="70" height="36" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1"/>
  <rect x="120" y="124" width="70" height="36" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1"/>
  <text x="132" y="146" font-size="8" fill="#3d4a5c">Router</text>
  <text x="128" y="158" font-size="7" fill="#3d4a5c" opacity="0.7">decrypt/re-encrypt</text>
  <rect x="220" y="124" width="70" height="36" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1"/>
  <rect x="320" y="124" width="70" height="36" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1"/>
  <rect x="420" y="124" width="90" height="36" rx="4" fill="none" stroke="#3d4a5c" stroke-width="1"/>
  <text x="20" y="178" font-size="8" fill="#3d4a5c" opacity="0.8">Plaintext briefly exposed at each hop (Layer 1/2) vs application-layer E2EE (Layer 7).</text>
</svg>
