<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 300" role="img" aria-label="Public-key cryptography">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 Z" fill="#3d4a5c"/>
    </marker>
  </defs>
  <rect x="20" y="30" width="140" height="56" rx="6" fill="none" stroke="#3d4a5c" stroke-width="1.5"/>
  <text x="35" y="55" font-size="11" font-weight="600" fill="#3d4a5c">Alice</text>
  <text x="35" y="72" font-size="9" fill="#3d4a5c" opacity="0.8">Plaintext</text>
  <rect x="200" y="24" width="120" height="44" rx="6" fill="none" stroke="#3d4a5c" stroke-width="1.5"/>
  <text x="215" y="44" font-size="10" font-weight="600" fill="#3d4a5c">Bob's public key</text>
  <text x="215" y="58" font-size="8" fill="#3d4a5c" opacity="0.75">Encrypt only</text>
  <path d="M160 58 H200" stroke="#3d4a5c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="360" y="30" width="140" height="56" rx="6" fill="none" stroke="#3d4a5c" stroke-width="1.5"/>
  <text x="375" y="55" font-size="11" font-weight="600" fill="#3d4a5c">Bob</text>
  <text x="375" y="72" font-size="9" fill="#3d4a5c" opacity="0.8">Ciphertext</text>
  <path d="M320 58 H360" stroke="#3d4a5c" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="360" y="120" width="140" height="56" rx="6" fill="none" stroke="#3d4a5c" stroke-width="2"/>
  <text x="375" y="145" font-size="10" font-weight="600" fill="#3d4a5c">Bob's private key</text>
  <text x="375" y="162" font-size="8" fill="#3d4a5c" opacity="0.75">Secret  decrypt</text>
  <path d="M430 86 V120" stroke="#3d4a5c" stroke-width="1.2" stroke-dasharray="4 3"/>
  <rect x="20" y="200" width="480" height="70" rx="6" fill="none" stroke="#3d4a5c" stroke-width="1" opacity="0.5"/>
  <text x="35" y="222" font-size="9" fill="#3d4a5c">Anyone can encrypt with the public key; only the private key holder can decrypt.</text>
</svg>
