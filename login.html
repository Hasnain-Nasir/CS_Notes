<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>
    (function () {
      try {
        if (localStorage.getItem("infosec-notes-theme") !== "light") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch (e) {
        document.documentElement.setAttribute("data-theme", "dark");
      }
    })();
  </script>
  <title>Sign in — Notes by Nain</title>
  <link rel="stylesheet" href="assets/css/notes.css">
  <script src="assets/js/theme.js" defer></script>
  <script src="assets/js/auth-page.js" defer></script>
</head>
<body class="auth-body">
  <div class="auth-page-bg" aria-hidden="true"></div>

  <header class="auth-page-header">
    <a class="global-brand auth-page-brand" href="/" aria-label="Notes By Nain">
      <span class="global-brand-text" aria-hidden="true">
        <span class="global-brand-word">Notes</span>
        <span class="global-brand-by">by</span>
        <span class="global-brand-name">
          <span class="global-brand-letter" style="--i:0">N</span>
          <span class="global-brand-letter" style="--i:1">a</span>
          <span class="global-brand-letter" style="--i:2">i</span>
          <span class="global-brand-letter" style="--i:3">n</span>
        </span>
      </span>
    </a>
    <button type="button" class="theme-toggle theme-toggle--icon" aria-pressed="false" aria-label="Switch theme">
      <span class="theme-toggle-icon" aria-hidden="true">
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
      </span>
    </button>
  </header>

  <main class="auth-page-main">
    <div class="auth-page-card" id="auth-card">
      <div class="auth-page-viewport">
        <!-- Login -->
        <section class="auth-page-panel is-active" data-panel="login" aria-labelledby="auth-login-title">
          <h1 id="auth-login-title">Welcome back</h1>
          <p class="auth-page-sub">Sign in to access course notes</p>
          <form id="auth-form-login" class="auth-page-form" novalidate>
            <label class="auth-page-field">
              <span>Username</span>
              <input name="username" autocomplete="username" required maxlength="64">
            </label>
            <label class="auth-page-field">
              <span>Password</span>
              <input name="password" type="password" autocomplete="current-password" required>
            </label>
            <p class="auth-error" id="auth-login-error" hidden></p>
            <button type="submit" class="auth-page-submit">Sign in</button>
          </form>
          <p class="auth-page-links">
            <button type="button" class="auth-page-link" data-switch="register">Don't have an account? Register</button>
            <button type="button" class="auth-page-link" data-switch="forgot">Forgot password?</button>
          </p>
        </section>

        <!-- Register -->
        <section class="auth-page-panel" data-panel="register" aria-labelledby="auth-register-title" hidden>
          <h1 id="auth-register-title">Create account</h1>
          <p class="auth-page-sub">Choose a username, display name, and password</p>
          <form id="auth-form-register" class="auth-page-form" novalidate>
            <label class="auth-page-field">
              <span>Username</span>
              <input name="username" autocomplete="username" required maxlength="64">
            </label>
            <label class="auth-page-field">
              <span>Display name</span>
              <input name="display_name" autocomplete="name" required maxlength="128">
            </label>
            <label class="auth-page-field">
              <span>Password</span>
              <input name="password" type="password" autocomplete="new-password" required minlength="6">
            </label>
            <p class="auth-error" id="auth-register-error" hidden></p>
            <button type="submit" class="auth-page-submit">Create account</button>
          </form>
          <p class="auth-page-links">
            <button type="button" class="auth-page-link" data-switch="login">Already have an account? Sign in</button>
          </p>
        </section>

        <!-- Forgot password -->
        <section class="auth-page-panel" data-panel="forgot" aria-labelledby="auth-forgot-title" hidden>
          <h1 id="auth-forgot-title">Forgot password?</h1>
          <p class="auth-page-sub">Enter your username. An admin will reset your password.</p>
          <form id="auth-form-forgot" class="auth-page-form" novalidate>
            <label class="auth-page-field">
              <span>Username</span>
              <input name="username" autocomplete="username" required maxlength="64">
            </label>
            <p class="auth-error" id="auth-forgot-error" hidden></p>
            <p class="auth-success" id="auth-forgot-success" hidden></p>
            <button type="submit" class="auth-page-submit">Submit request</button>
          </form>
          <p class="auth-page-links">
            <button type="button" class="auth-page-link" data-switch="login">Back to sign in</button>
          </p>
        </section>
      </div>
    </div>
  </main>
</body>
</html>
